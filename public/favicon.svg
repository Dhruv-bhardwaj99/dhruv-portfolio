<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Main indigo → cyan gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#16163a"/>
      <stop offset="100%" stop-color="#0a0a1f"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Gradient border ring -->
  <rect x="2.5" y="2.5" width="95" height="95" rx="20"
        fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.55"/>

  <!-- Letter D -->
  <text
    x="27"
    y="72"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="62"
    font-weight="900"
    fill="url(#grad)"
    filter="url(#glow)"
    letter-spacing="-1"
  >D</text>

  <!-- Small accent dot — bottom right -->
  <circle cx="72" cy="72" r="7" fill="url(#grad)" opacity="0.9" filter="url(#glow)"/>

  <!-- Thin underline accent below D -->
  <rect x="22" y="80" width="38" height="3.5" rx="2" fill="url(#grad)" opacity="0.5"/>
</svg>
